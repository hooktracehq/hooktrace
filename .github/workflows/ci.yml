name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  infra-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # -------------------------------
      # BUILD & START SERVICES
      # -------------------------------

      - name: Build and start all services
        run: |
          docker compose up -d --build postgres redis api
        env:
          DATABASE_URL: postgresql://hooktrace:hooktrace_dev@postgres:5432/hooktrace
          REDIS_URL: redis://redis:6379

      - name: Wait for Postgres to be healthy
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 20); do
            docker exec hooktrace-db pg_isready -U hooktrace && break
            echo "  attempt $i/20 — not ready yet"
            sleep 3
          done

      - name: Wait for Redis to be healthy
        run: |
          echo "Waiting for Redis..."
          for i in $(seq 1 20); do
            docker exec hooktrace-redis redis-cli ping | grep -q PONG && break
            echo "  attempt $i/20 — not ready yet"
            sleep 3
          done

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:3001/health && break
            echo "  attempt $i/20 — not ready yet"
            sleep 5
          done

      # -------------------------------
      # VERIFY SERVICES
      # -------------------------------

      - name: Verify Postgres is reachable
        run: |
          docker exec hooktrace-db psql -U hooktrace -d hooktrace -c "SELECT 1;"

      - name: Verify Redis is reachable
        run: |
          docker exec hooktrace-redis redis-cli ping

      - name: Debug API logs (pre-test)
        run: docker logs hooktrace-api

      # -------------------------------
      # SYSTEM INTEGRATION TEST
      # -------------------------------

      - name: Register CI test user
        run: |
          curl -s -X POST http://localhost:3001/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@example.com","password":"ci_test_pass"}' \
            | python3 -m json.tool || true

      - name: Login and get token
        run: |
          RESP=$(curl -s -X POST http://localhost:3001/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@example.com","password":"ci_test_pass"}')

          echo "Login response: $RESP"

          TOKEN=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))")

          if [ -z "$TOKEN" ]; then
            echo " Login failed"
            exit 1
          fi

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Create a route
        run: |
          RESP=$(curl -s -X POST http://localhost:3001/routes/ \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"name":"ci-test-route"}')

          echo "Create route response: $RESP"

          ROUTE_TOKEN=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          ROUTE_PATH=$(echo $RESP | python3 -c "import sys,json; print(json.load(sys.stdin).get('route','ci'))")

          if [ -z "$ROUTE_TOKEN" ]; then
            echo " Failed to create route"
            exit 1
          fi

          echo "ROUTE_TOKEN=$ROUTE_TOKEN" >> $GITHUB_ENV
          echo "ROUTE_PATH=$ROUTE_PATH" >> $GITHUB_ENV

      - name: Send test webhook
        run: |
          echo "Using route: /r/$ROUTE_TOKEN/$ROUTE_PATH"

          RESPONSE=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST http://localhost:3001/r/$ROUTE_TOKEN/$ROUTE_PATH \
            -H "Content-Type: application/json" \
            -d '{"event":"ci_test","data":{"source":"github-actions"}}')

          echo "Response code: $RESPONSE"
          echo "Response body: $(cat /tmp/webhook_response.txt)"

          if [ "$RESPONSE" -ge 400 ]; then
            echo " Webhook failed with status $RESPONSE"
            exit 1
          fi

      - name: Wait for processing
        run: sleep 5

      - name: Verify webhook stored in DB
        run: |
          docker exec hooktrace-db psql -U hooktrace -d hooktrace -c \
            "SELECT * FROM events ORDER BY created_at DESC LIMIT 1;"

      # -------------------------------
      # TEARDOWN
      # -------------------------------

      - name: Show all container logs on failure
        if: failure()
        run: |
          echo "=== API logs ===" && docker logs hooktrace-api || true
          echo "=== DB logs ===" && docker logs hooktrace-db || true
          echo "=== Redis logs ===" && docker logs hooktrace-redis || true

      - name: Stop all services
        if: always()
        run: docker compose down -v